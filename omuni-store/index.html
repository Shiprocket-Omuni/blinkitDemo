<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#c62828" />
  <title>Omuni Store — Fulfil</title>
  <link rel="stylesheet" href="omuni-app.css" />
</head>
<body class="omuni-app omuni-app--home">
  <p class="omuni-back-blinkit">
    <a href="../index.html" class="omuni-back-blinkit__link">← Back to Blinkit</a>
  </p>
  <div class="omuni-home-brand">
    <p class="omuni-home-brand__logo">Bata</p>
    <p class="omuni-home-brand__store">BATA RAJOURI GDN II</p>
  </div>

  <main class="omuni-home-main">
    <section class="omuni-section" aria-labelledby="sec-order">
      <h2 class="omuni-section__title" id="sec-order">Order</h2>
      <div class="omuni-icon-grid">
        <a href="assigned.html" class="omuni-icon-tile">
          <span class="omuni-badge" aria-label="7 pending">7</span>
          <span class="omuni-icon-tile__glyph" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
          </span>
          <span class="omuni-icon-tile__label">Assigned to this store</span>
        </a>
        <div class="omuni-icon-tile" role="button" tabindex="0">
          <span class="omuni-icon-tile__glyph" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="7" width="18" height="14" rx="2"/><path d="M8 7V5a2 2 0 012-2h4a2 2 0 012 2v2"/><circle cx="16" cy="11" r="3" fill="currentColor" stroke="none"/></svg>
          </span>
          <span class="omuni-icon-tile__label">Orders on hold</span>
        </div>
        <div class="omuni-icon-tile" role="button" tabindex="0">
          <span class="omuni-icon-tile__glyph" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M8 15s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/></svg>
          </span>
          <span class="omuni-icon-tile__label">Missed orders</span>
        </div>
        <div class="omuni-icon-tile" role="button" tabindex="0">
          <span class="omuni-icon-tile__glyph" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M4.93 4.93l14.14 14.14"/></svg>
          </span>
          <span class="omuni-icon-tile__label">Rejected orders</span>
        </div>
      </div>
    </section>

    <section class="omuni-section" aria-labelledby="sec-handover">
      <h2 class="omuni-section__title" id="sec-handover">Handover</h2>
      <div class="omuni-icon-grid">
        <div class="omuni-icon-tile" role="button" tabindex="0">
          <span class="omuni-icon-tile__glyph" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12h4l2-7h10l2 7h4"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/><path d="M5 12l2-5h10l2 5" stroke-dasharray="2 2"/></svg>
          </span>
          <span class="omuni-icon-tile__label">Ready for courier</span>
        </div>
        <div class="omuni-icon-tile" role="button" tabindex="0">
          <span class="omuni-icon-tile__glyph" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          </span>
          <span class="omuni-icon-tile__label">Ready for pickup</span>
        </div>
        <div class="omuni-icon-tile" role="button" tabindex="0">
          <span class="omuni-icon-tile__glyph" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="5" r="2"/><path d="M7 22v-6l-2-4h14l-2 4v6"/><path d="M5 12h14"/></svg>
          </span>
          <span class="omuni-icon-tile__label">Delivery by store</span>
        </div>
      </div>
    </section>

    <section class="omuni-section" aria-labelledby="sec-return">
      <h2 class="omuni-section__title" id="sec-return">Return / RTO</h2>
      <div class="omuni-icon-grid">
        <div class="omuni-icon-tile" role="button" tabindex="0">
          <span class="omuni-icon-tile__glyph" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 8V4h4M20 8V4h-4M4 16v4h4M20 16v4h-4"/><path d="M7 8h10M7 16h10M8 4v16M16 4v16"/></svg>
          </span>
          <span class="omuni-icon-tile__label">Scan</span>
        </div>
        <div class="omuni-icon-tile" role="button" tabindex="0">
          <span class="omuni-icon-tile__glyph" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22a10 10 0 0010-10h-3a7 7 0 01-7 7v3z"/><circle cx="12" cy="12" r="3"/></svg>
          </span>
          <span class="omuni-icon-tile__label">Upcoming</span>
        </div>
        <div class="omuni-icon-tile" role="button" tabindex="0">
          <span class="omuni-icon-tile__glyph" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22a10 10 0 01-10-10h3a7 7 0 0014 0h3a10 10 0 01-10 10z"/><rect x="6" y="10" width="12" height="8" rx="1"/></svg>
          </span>
          <span class="omuni-icon-tile__label">Delivered not processed</span>
        </div>
        <div class="omuni-icon-tile" role="button" tabindex="0">
          <span class="omuni-icon-tile__glyph" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12l2-7h14l2 7M5 12v8h14v-8"/><circle cx="12" cy="15" r="1"/></svg>
          </span>
          <span class="omuni-icon-tile__label">Pending</span>
        </div>
      </div>
    </section>
  </main>

  <nav class="omuni-bottom-nav" aria-label="Main">
    <button type="button" class="omuni-bottom-nav__item">
      <span class="omuni-bottom-nav__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="6" width="16" height="14" rx="2"/></svg>
      </span>
      Order
    </button>
    <a href="index.html" class="omuni-bottom-nav__item omuni-bottom-nav__item--active">
      <span class="omuni-bottom-nav__icon" aria-hidden="true">
        <span class="omuni-bottom-nav__badge omuni-badge">7</span>
        <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 8h16v12H4z"/><path d="M8 8V6a4 4 0 018 0v2"/></svg>
      </span>
      Fulfil
    </a>
    <button type="button" class="omuni-bottom-nav__item">
      <span class="omuni-bottom-nav__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 22V8l9-5 9 5v14"/><path d="M9 22v-8h6v8"/></svg>
      </span>
      Store
    </button>
  </nav>
</body>
</html>
